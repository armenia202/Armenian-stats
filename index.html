<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hay-Stats | Աթլետների Համեմատություն</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background: linear-gradient(90deg, #d4af37, #8a6d3b);
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .container {
            max-width: 1000px;
            width: 90%;
            margin-top: 30px;
            background: #252525;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .selectors {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
        }
        select {
            padding: 10px;
            border-radius: 5px;
            background: #333;
            color: gold;
            border: 1px solid gold;
            width: 40%;
            font-size: 16px;
        }
        .comparison-area {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
        }
        .chart-container {
            width: 500px;
            height: 500px;
        }
        .athlete-card {
            text-align: center;
            width: 200px;
        }
        .athlete-card img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid gold;
            object-fit: cover;
            margin-bottom: 10px;
        }
        h2 { color: gold; }
        .footer {
            margin-top: 40px;
            font-size: 0.8em;
            color: #777;
        }
    </style>
</head>
<body>

<header>
    <h1>HAY-STATS ANALYZER</h1>
    <p>Մաթեմատիկական մոդելավորում 10-րդ դասարանի համար</p>
</header>

<div class="container">
    <div class="selectors">
        <select id="select1" onchange="updateChart()"></select>
        <select id="select2" onchange="updateChart()"></select>
    </div>

    <div class="comparison-area">
        <div id="card1" class="athlete-card">
            <img id="img1" src="" alt="">
            <h3 id="name1"></h3>
        </div>

        <div class="chart-container">
            <canvas id="radarChart"></canvas>
        </div>

        <div id="card2" class="athlete-card">
            <img id="img2" src="" alt="">
            <h3 id="name2"></h3>
        </div>
    </div>
</div>

<div class="footer">Նախագծված է բաց դասի շրջանակներում © 2026</div>

<script>
// Քո տվյալների բազան (Data Step 3-ից)
const athletes = [
    { id: 0, name: "Արման Ծառուկյան", sport: "MMA", stats: [88, 95, 92, 90, 82], img: "images/arman.jpg" },
    { id: 1, name: "Արթուր Ալեքսանյան", sport: "Ըմբշամարտ", stats: [98, 92, 96, 78, 100], img: "images/artur.jpg" },
    { id: 2, name: "Գենրիխ Մխիթարյան", sport: "Ֆուտբոլ", stats: [72, 88, 98, 85, 95], img: "images/heno.jpg" },
    { id: 3, name: "Վարազդատ Լալայան", sport: "Ծանրամարտ", stats: [100, 65, 88, 72, 85], img: "images/varazdat.jpg" },
    { id: 4, name: "Լևոն Արոնյան", sport: "Շախմատ", stats: [40, 80, 100, 60, 98], img: "images/levon.jpg" }
];

// Ինիցիալիզացիա
const sel1 = document.getElementById('select1');
const sel2 = document.getElementById('select2');

athletes.forEach(a => {
    sel1.innerHTML += `<option value="${a.id}">${a.name}</option>`;
    sel2.innerHTML += `<option value="${a.id}">${a.name}</option>`;
});
sel2.selectedIndex = 1; // Որպեսզի միանգամից երկու տարբեր լինեն

let radarChart;

function updateChart() {
    const a1 = athletes[sel1.value];
    const a2 = athletes[sel2.value];

    // Թարմացնել նկարները
    document.getElementById('img1').src = a1.img;
    document.getElementById('name1').innerText = a1.name;
    document.getElementById('img2').src = a2.img;
    document.getElementById('name2').innerText = a2.name;

    const data = {
        labels: ['Ուժ', 'Դիմացկունություն', 'Տեխնիկա', 'Արագություն', 'Փորձ'],
        datasets: [{
            label: a1.name,
            data: a1.stats,
            fill: true,
            backgroundColor: 'rgba(212, 175, 55, 0.2)',
            borderColor: 'rgb(212, 175, 55)',
            pointBackgroundColor: 'rgb(212, 175, 55)'
        }, {
            label: a2.name,
            data: a2.stats,
            fill: true,
            backgroundColor: 'rgba(255, 255, 255, 0.2)',
            borderColor: 'rgb(255, 255, 255)',
            pointBackgroundColor: 'rgb(255, 255, 255)'
        }]
    };

    if (radarChart) { radarChart.destroy(); }

    const ctx = document.getElementById('radarChart').getContext('2d');
    radarChart = new Chart(ctx, {
        type: 'radar',
        data: data,
        options: {
            scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: '#444' } } },
            plugins: { legend: { labels: { color: 'white' } } }
        }
    });
}

// Առաջին անգամ կանչել
updateChart();
</script>

</body>
</html>
