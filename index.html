<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAY-STATS PRO | Մարզիկների Պատմություն և Վերլուծություն</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { background: #1a1a1a; width: 100%; padding: 20px 0; text-align: center; border-bottom: 2px solid gold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .nav-buttons { margin-top: 15px; }
        .nav-btn { background: none; border: 2px solid gold; color: gold; padding: 10px 20px; font-size: 14px; font-weight: bold; cursor: pointer; margin: 5px; border-radius: 30px; transition: 0.3s; }
        .nav-btn.active { background: gold; color: black; }
        .container { max-width: 1000px; width: 95%; margin: 30px auto; }
        .page { display: none; background: #1e1e1e; padding: 30px; border-radius: 20px; border: 1px solid #333; }
        .active-page { display: block; }

        /* Բաժին 1 & 2 Styles */
        .selectors { display: flex; justify-content: space-between; margin-bottom: 30px; }
        select { padding: 12px; border-radius: 8px; background: #2a2a2a; color: gold; border: 1px solid gold; width: 48%; font-size: 16px; }
        .comparison-display { display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; }
        .athlete-info img { width: 130px; height: 130px; border-radius: 50%; border: 3px solid gold; object-fit: cover; }
        .chart-box { width: 450px; height: 400px; }

        /* Բաժին 3. Պատմություն & Գրաֆիկ */
        .history-layout { display: flex; gap: 30px; margin-top: 20px; flex-wrap: wrap; }
        .bio-card { flex: 1; background: #252525; padding: 25px; border-radius: 15px; border-left: 5px solid gold; }
        .bio-card h3 { color: gold; margin-top: 0; }
        .bio-text { line-height: 1.6; color: #ccc; font-size: 15px; }
        .line-chart-box { flex: 1; min-width: 400px; height: 350px; background: #252525; padding: 20px; border-radius: 15px; }
        #scheduleImgSmall { width: 100px; height: 100px; border-radius: 50%; border: 2px solid gold; object-fit: cover; margin-bottom: 15px; }
        
        .slider-box { margin-bottom: 20px; }
        .slider-box label { display: flex; justify-content: space-between; font-weight: bold; }
        input[type="range"] { width: 100%; accent-color: gold; }
        .btn-calc { background: gold; color: black; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .math-formula { font-family: monospace; background: #000; padding: 10px; color: #0f0; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <h1>HAY-STATS PRO</h1>
    <div class="nav-buttons">
        <button class="nav-btn active" onclick="showPage('compPage', this)">📊 ՀԱՄԵՄԱՏՈՒՄ</button>
        <button class="nav-btn" onclick="showPage('mathPage', this)">🧮 ՀԱՇՎԱՐԿԻ ՄՈԴԵԼ</button>
        <button class="nav-btn" onclick="showPage('schedulePage', this)">📜 ՊԱՏՄՈՒԹՅՈՒՆ & ՌԵԺԻՄ</button>
    </div>
</header>

<div class="container">
    <div id="compPage" class="page active-page">
        <div class="selectors"><select id="sel1" onchange="updateChart()"></select><select id="sel2" onchange="updateChart()"></select></div>
        <div class="comparison-display">
            <div class="athlete-info"><img id="img1" src=""><h3 id="name1"></h3></div>
            <div class="chart-box"><canvas id="myChart"></canvas></div>
            <div class="athlete-info"><img id="img2" src=""><h3 id="name2"></h3></div>
        </div>
    </div>

    <div id="mathPage" class="page">
        <h2 style="color: gold; text-align: center;">Կշիռների Լաբորատորիա</h2>
        <div id="sliders-container"></div>
        <button class="btn-calc" onclick="calculateWinner()">🥇 ԳՏՆԵԼ ԼԱՎԱԳՈՒՅՆԻՆ</button>
        <div id="result-area" style="display:none; margin-top:20px; text-align:center; border: 1px dashed gold; padding: 15px;">
            <h2 id="winner-name" style="color:gold;"></h2>
            <div class="math-formula" id="math-formula"></div>
        </div>
    </div>

    <div id="schedulePage" class="page">
        <h2 style="color: gold; text-align: center;">Մարզիկի Հաջողության Պատմությունը</h2>
        <div style="text-align:center;"><select id="scheduleSelect" onchange="updateScheduleChart()" style="width:50%;"></select></div>
        <div class="history-layout">
            <div class="bio-card">
                <img id="scheduleImgSmall" src="">
                <h3 id="bioName"></h3>
                <p class="bio-text" id="bioText"></p>
            </div>
            <div class="line-chart-box"><canvas id="lineChart"></canvas></div>
        </div>
    </div>
</div>

<script>
const athletes = [
    { id: 0, name: "Արման Ծառուկյան", stats: [88, 95, 92, 90, 82], img: "images/IMG_20260321_135710.jpg", schedule: [8, 6, 3, 7], bio: "UFC-ի առաջատար մարտիկ: Նա հայտնի է իր անդադար աշխատասիրությամբ և ըմբշամարտի բարձր տեխնիկայով: Նրա հաջողության գաղտնիքը յուրաքանչյուր մարզման ժամանակ սահմաններն անցնելն է:" },
    { id: 1, name: "Արթուր Ալեքսանյան", stats: [98, 92, 96, 78, 100], img: "images/IMG_20260321_135339.jpg", schedule: [9, 5, 4, 6], bio: "«Ճերմակ Արջ»: Հունահռոմեական ըմբշամարտի օլիմպիական չեմպիոն: Հայկական սպորտի ուժի և կայունության խորհրդանիշը, ով ապացուցել է, որ կարգապահությունը հաղթանակի հիմքն է:" },
    { id: 2, name: "Հենրիխ Մխիթարյան", stats: [72, 88, 98, 85, 95], img: "images/IMG_20260321_135925.jpg", schedule: [8, 4, 3, 9], bio: "Հայկական ֆուտբոլի լեգենդ: Խաղացել է աշխարհի լավագույն ակումբներում: Նրա խաղային ինտելեկտը և պրոֆեսիոնալիզմը օրինակ են երիտասարդ մարզիկների համար:" },
    { id: 3, name: "Վարազդատ Լալայան", stats: [100, 65, 88, 72, 85], img: "images/IMG_20260321_140028.jpg", schedule: [8, 7, 4, 5], bio: "Ծանրամարտի աշխարհի առաջատարներից: Բացառիկ ուժի տեր մարզիկ, ով յուրաքանչյուր մրցաշարում պայքարում է կիլոգրամների և երկրի ձգողականության դեմ:" },
    { id: 4, name: "Լևոն Արոնյան", stats: [40, 80, 100, 60, 98], img: "images/IMG_20260321_140328.jpg", schedule: [7, 8, 2, 7], bio: "Շախմատի հանճար: Եռակի օլիմպիական չեմպիոն: Նա ցույց է տալիս, որ մտավոր ուժը և ստեղծագործական միտքը նույնքան կարևոր են, որքան ֆիզիկական տվյալները:" },
    { id: 5, name: "Սիմոն Մարտիրոսյան", stats: [99, 70, 92, 75, 94], img: "images/IMG_20260321_140452.jpg", schedule: [8, 6, 4, 6], bio: "Երկակի օլիմպիական փոխչեմպիոն և աշխարհի չեմպիոն: Ծանրամարտի հայկական դպրոցի փայլուն ներկայացուցիչ, ով հայտնի է իր կամային որակներով:" },
    { id: 6, name: "Արսեն Ջուլֆալակյան", stats: [90, 94, 94, 82, 96], img: "images/IMG_20260321_140656.jpg", schedule: [8, 5, 3, 8], bio: "Աշխարհի չեմպիոն և օլիմպիական մեդալակիր: Մարզիկ, ով համատեղում է սպորտային կարիերան գիտական և հասարակական գործունեության հետ:" },
    { id: 7, name: "Էդուարդ Սպերցյան", stats: [75, 85, 92, 88, 75], img: "images/IMG_20260321_140749.jpg", schedule: [8, 4, 3, 9], bio: "Հայկական ֆուտբոլի նոր աստղը: Հայտնի է իր տուգանային հարվածներով և դաշտը տեսնելու ունակությամբ: Ապագայի մեծագույն հույսերից մեկը:" }
];

const labels = ['Ուժ', 'Դիմացկունություն', 'Տեխնիկա', 'Արագություն', 'Փորձ'];
let myChart, lineChart;

function init() {
    const s1 = document.getElementById('sel1'), s2 = document.getElementById('sel2'), sSched = document.getElementById('scheduleSelect'), sld = document.getElementById('sliders-container');
    athletes.forEach(a => { const opt = `<option value="${a.id}">${a.name}</option>`; s1.innerHTML += opt; s2.innerHTML += opt; sSched.innerHTML += opt; });
    labels.forEach((l, i) => { sld.innerHTML += `<div class="slider-box"><label>${l} <span id="p${i}">20%</span></label><input type="range" id="w${i}" min="0" max="100" value="20" oninput="syncWeights()"></div>`; });
    s2.selectedIndex = 1; updateChart(); updateScheduleChart();
}

function showPage(pId, b) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
    document.getElementById(pId).classList.add('active-page');
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    b.classList.add('active');
    if(pId === 'compPage') updateChart();
    if(pId === 'schedulePage') updateScheduleChart();
}

function syncWeights() {
    let t = 0; for(let i=0; i<5; i++) t += parseInt(document.getElementById(`w${i}`).value);
    if(t === 0) t = 1;
    for(let i=0; i<5; i++) document.getElementById(`p${i}`).innerText = Math.round((document.getElementById(`w${i}`).value / t) * 100) + "%";
}

function updateChart() {
    const a1 = athletes[document.getElementById('sel1').value], a2 = athletes[document.getElementById('sel2').value];
    document.getElementById('img1').src = a1.img; document.getElementById('name1').innerText = a1.name;
    document.getElementById('img2').src = a2.img; document.getElementById('name2').innerText = a2.name;
    if (myChart) myChart.destroy();
    myChart = new Chart(document.getElementById('myChart'), { type: 'radar', data: { labels: labels, datasets: [{ label: a1.name, data: a1.stats, backgroundColor: 'rgba(212, 175, 55, 0.3)', borderColor: 'gold', borderWidth: 2 }, { label: a2.name, data: a2.stats, backgroundColor: 'rgba(255, 255, 255, 0.1)', borderColor: 'white', borderWidth: 2 }] }, options: { scales: { r: { min: 0, max: 100, grid: { color: '#444' }, ticks: { display: false } } }, plugins: { legend: { display: false } } } });
}

function calculateWinner() {
    let w = [], tw = 0; for(let i=0; i<5; i++) { let v = parseInt(document.getElementById(`w${i}`).value); w.push(v); tw += v; }
    let win = null, ms = -1, f = "";
    athletes.forEach(a => {
        let s = 0, pts = []; a.stats.forEach((st, i) => { let p = w[i]/tw; s += st * p; pts.push(`(${p.toFixed(2)}×${st})`); });
        if(s > ms) { ms = s; win = a; f = pts.join(" + "); }
    });
    document.getElementById('result-area').style.display = 'block';
    document.getElementById('winner-name').innerText = "Հաղթող՝ " + win.name;
    document.getElementById('math-formula').innerHTML = `S = ${f} = ${ms.toFixed(1)}`;
}

function updateScheduleChart() {
    const a = athletes[document.getElementById('scheduleSelect').value];
    document.getElementById('scheduleImgSmall').src = a.img;
    document.getElementById('bioName').innerText = a.name;
    document.getElementById('bioText').innerText = a.bio;
    if (lineChart) lineChart.destroy();
    lineChart = new Chart(document.getElementById('lineChart'), { type: 'line', data: { labels: ['Քուն', 'Մարզում', 'Սնունդ', 'Հանգիստ'], datasets: [{ label: 'Ժամ', data: a.schedule, borderColor: 'gold', backgroundColor: 'rgba(212, 175, 55, 0.2)', fill: true, tension: 0.4, pointRadius: 5 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 12, grid: { color: '#444' }, ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } }, plugins: { legend: { display: false } } } });
}

init();
</script>
</body>
</html>
