<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hay-Stats PRO | Հայաստանի Մեծագույն Աթլետը</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: linear-gradient(135deg, #d4af37 0%, #8a6d3b 100%); width: 100%; padding: 30px 0; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        h1 { margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        .main-container { max-width: 1200px; width: 95%; margin: 30px auto; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        
        .card { background: #1e1e1e; padding: 25px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Համեմատության բաժին */
        .selectors { display: flex; justify-content: space-between; margin-bottom: 30px; }
        select { padding: 12px; border-radius: 8px; background: #2a2a2a; color: #ffd700; border: 1px solid #ffd700; width: 48%; font-size: 16px; outline: none; }
        .comparison-display { display: flex; justify-content: space-around; align-items: center; }
        .athlete-info { text-align: center; width: 150px; }
        .athlete-info img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #ffd700; object-fit: cover; margin-bottom: 10px; transition: 0.3s; }
        .chart-box { width: 400px; height: 400px; }

        /* Լաբորատորիա */
        .lab-title { color: #ffd700; text-align: center; margin-top: 0; }
        .slider-box { margin-bottom: 20px; }
        .slider-box label { display: flex; justify-content: space-between; font-size: 0.9em; margin-bottom: 8px; color: #ccc; }
        input[type="range"] { width: 100%; accent-color: #ffd700; cursor: pointer; }
        
        .btn-goat { background: linear-gradient(90deg, #d4af37, #b8860b); color: black; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-goat:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }

        #result-box { margin-top: 20px; padding: 15px; border-radius: 12px; background: rgba(212, 175, 55, 0.1); border: 1px dashed #ffd700; display: none; text-align: center; }
        .goat-name { font-size: 1.5em; color: #ffd700; font-weight: bold; margin: 5px 0; }

        @media (max-width: 900px) { .main-container { grid-template-columns: 1fr; } .chart-box { width: 300px; height: 300px; } }
    </style>
</head>
<body>

<header>
    <h1>HAY-STATS PRO</h1>
    <p>Մաթեմատիկական Մոդելավորում | 10-րդ Դասարան</p>
</header>

<div class="main-container">
    <div class="card">
        <div class="selectors">
            <select id="sel1" onchange="update()"></select>
            <select id="sel2" onchange="update()"></select>
        </div>
        <div class="comparison-display">
            <div class="athlete-info">
                <img id="img1" src="" alt="">
                <h3 id="name1"></h3>
            </div>
            <div class="chart-box">
                <canvas id="myChart"></canvas>
            </div>
            <div class="athlete-info">
                <img id="img2" src="" alt="">
                <h3 id="name2"></h3>
            </div>
        </div>
    </div>

    <div class="card">
        <h2 class="lab-title">Լաբորատորիա</h2>
        <p style="font-size: 0.8em; color: #888; text-align: center;">Սահմանիր հատկանիշների կարևորությունը (կշիռները)</p>
        
        <div id="sliders"></div>

        <button class="btn-goat" onclick="calculateGOAT()">🥇 ԳՏՆԵԼ ԼԱՎԱԳՈՒՅՆԻՆ</button>

        <div id="result-box">
            <span>Ըստ ձեր մոդելի՝ լավագույնն է</span>
            <div id="goat-name" class="goat-name"></div>
            <small id="goat-score"></small>
        </div>
    </div>
</div>

<script>
// Տվյալների բազա
const athletes = [
    { id: 0, name: "Արման Ծառուկյան", sport: "MMA", stats: [88, 95, 92, 90, 82], img: "images/arman.jpg" },
    { id: 1, name: "Արթուր Ալեքսանյան", sport: "Ըմբշամարտ", stats: [98, 92, 96, 78, 100], img: "images/artur.jpg" },
    { id: 2, name: "Գենրիխ Մխիթարյան", sport: "Ֆուտբոլ", stats: [72, 88, 98, 85, 95], img: "images/heno.jpg" },
    { id: 3, name: "Վարազդատ Լալայան", sport: "Ծանրամարտ", stats: [100, 65, 88, 72, 85], img: "images/varazdat.jpg" },
    { id: 4, name: "Լևոն Արոնյան", sport: "Շախմատ", stats: [40, 80, 100, 60, 98], img: "images/levon.jpg" },
    { id: 5, name: "Էդուարդ Սպերցյան", sport: "Ֆուտբոլ", stats: [75, 85, 92, 88, 75], img: "images/spertsyan.jpg" }
];

const labels = ['Ուժ', 'Դիմացկունություն', 'Տեխնիկա', 'Արագություն', 'Փորձ'];
let myChart;

// Սլայդերների ստեղծում
const sliderContainer = document.getElementById('sliders');
labels.forEach((label, i) => {
    sliderContainer.innerHTML += `
        <div class="slider-box">
            <label>${label} <span id="val${i}">20%</span></label>
            <input type="range" id="w${i}" min="0" max="100" value="20" oninput="syncWeights()">
        </div>
    `;
});

function init() {
    const s1 = document.getElementById('sel1');
    const s2 = document.getElementById('sel2');
    athletes.forEach(a => {
        s1.innerHTML += `<option value="${a.id}">${a.name}</option>`;
        s2.innerHTML += `<option value="${a.id}">${a.name}</option>`;
    });
    s2.selectedIndex = 1;
    update();
}

function syncWeights() {
    let total = 0;
    for(let i=0; i<5; i++) total += parseInt(document.getElementById(`w${i}`).value);
    if(total === 0) total = 1;
    for(let i=0; i<5; i++) {
        let p = Math.round((document.getElementById(`w${i}`).value / total) * 100);
        document.getElementById(`val${i}`).innerText = p + "%";
    }
}

function update() {
    const a1 = athletes[document.getElementById('sel1').value];
    const a2 = athletes[document.getElementById('sel2').value];
    
    document.getElementById('img1').src = a1.img;
    document.getElementById('name1').innerText = a1.name;
    document.getElementById('img2').src = a2.img;
    document.getElementById('name2').innerText = a2.name;

    if (myChart) myChart.destroy();
    const ctx = document.getElementById('myChart').getContext('2d');
    myChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: labels,
            datasets: [
                { label: a1.name, data: a1.stats, backgroundColor: 'rgba(212, 175, 55, 0.2)', borderColor: '#ffd700', borderWidth: 2 },
                { label: a2.name, data: a2.stats, backgroundColor: 'rgba(255, 255, 255, 0.1)', borderColor: '#fff', borderWidth: 2 }
            ]
        },
        options: { 
            scales: { r: { angleLines: { color: '#444' }, grid: { color: '#444' }, pointLabels: { color: '#fff' }, ticks: { display: false }, min: 0, max: 100 } },
            plugins: { legend: { display: false } }
        }
    });
}

function calculateGOAT() {
    let best = null;
    let maxS = -1;
    let w = [];
    let totalW = 0;
    for(let i=0; i<5; i++) {
        let val = parseInt(document.getElementById(`w${i}`).value);
        w.push(val);
        totalW += val;
    }

    athletes.forEach(a => {
        let score = 0;
        for(let i=0; i<5; i++) score += (w[i]/totalW) * a.stats[i];
        if(score > maxS) { maxS = score; best = a; }
    });

    document.getElementById('result-box').style.display = 'block';
    document.getElementById('goat-name').innerText = best.name;
    document.getElementById('goat-score').innerText = "Միավորը՝ " + maxS.toFixed(1) + " / 100";
}

init();
</script>
</body>
</html>
